# fixtures/reservation.yaml

App\Entity\Reservation:
  reservation_{1..5}:
    property: "@property_<current()>"
    guest: "@mon_user_<current()>"
    checkinDate: "<dateTimeBetween('+7 days', '+14 days')>"
    checkoutDate: "<dateTimeBetween('+15 days', '+21 days')>"
    guestsCount: "<numberBetween(1, 6)>"
