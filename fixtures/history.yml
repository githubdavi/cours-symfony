    cleaningFee: "<randomFloat(2, 10, 150)>"
    serviceFee: "<randomFloat(2, 5, 100)>"
    securityDeposit: "<randomFloat(2, 50, 500)>"
    currency: "<randomElement(['EUR', 'USD', 'GBP'])>"
    cancellationReason: null
